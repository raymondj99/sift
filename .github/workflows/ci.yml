name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  ORT_VERSION: "1.20.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libbz2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libbz2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: /opt/onnxruntime
          key: onnxruntime-${{ env.ORT_VERSION }}-linux-x64

      - name: Install ONNX Runtime
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          curl -L -o /tmp/ort.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz
          sudo mkdir -p /opt/onnxruntime
          sudo tar -xzf /tmp/ort.tgz -C /opt/onnxruntime --strip-components=1

      - name: Run tests
        env:
          ORT_DYLIB_PATH: /opt/onnxruntime/lib/libonnxruntime.so
        run: cargo test --workspace
      - name: Run tests (all features)
        env:
          ORT_DYLIB_PATH: /opt/onnxruntime/lib/libonnxruntime.so
        run: cargo test --workspace --all-features

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libbz2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: /opt/onnxruntime
          key: onnxruntime-${{ env.ORT_VERSION }}-linux-x64

      - name: Install ONNX Runtime
        if: steps.cache-ort.outputs.cache-hit != 'true'
        run: |
          curl -L -o /tmp/ort.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz
          sudo mkdir -p /opt/onnxruntime
          sudo tar -xzf /tmp/ort.tgz -C /opt/onnxruntime --strip-components=1

      - name: Cache vision model
        id: cache-vision-model
        uses: actions/cache@v4
        with:
          path: /tmp/test-models/nomic-embed-vision
          key: vision-model-nomic-embed-vision-v1.5

      - name: Download vision model
        if: steps.cache-vision-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/test-models/nomic-embed-vision
          curl -L -o /tmp/test-models/nomic-embed-vision/model.onnx \
            https://huggingface.co/nomic-ai/nomic-embed-vision-v1.5/resolve/main/onnx/model.onnx

      - name: Verify model exists
        run: ls -lh /tmp/test-models/nomic-embed-vision/model.onnx

      - name: Run integration tests
        env:
          ORT_DYLIB_PATH: /opt/onnxruntime/lib/libonnxruntime.so
        run: cargo test --workspace --all-features -- --include-ignored
