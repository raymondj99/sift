[workspace]
resolver = "2"
members = [
    "crates/sift-core",
    "crates/sift-sources",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.75"

[workspace.dependencies]
# Core
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
anyhow = "1"
thiserror = "2"
blake3 = "1"

# File processing
walkdir = "2"
ignore = "0.4"
infer = { version = "0.16", default-features = false, features = ["alloc"] }

# Testing
tempfile = "3"

# Internal crates
sift-core = { path = "crates/sift-core" }

[profile.dev.package."*"]
opt-level = 1

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
